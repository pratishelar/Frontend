<div class="metric-grid">
  <article class="metric-card" *ngFor="let card of cards">
    <div class="metric-head">
      <p>{{ card.title }}</p>
      <span><i class="bi" [ngClass]="card.iconClass" aria-hidden="true"></i></span>
    </div>
    <h2>{{ card.value }}</h2>
    <small [class.down]="!card.trendUp">
      <i class="bi" [ngClass]="card.trendUp ? 'bi-arrow-up-short' : 'bi-arrow-down-short'" aria-hidden="true"></i>
      {{ card.trend }}
    </small>
  </article>
</div>
