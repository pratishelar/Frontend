<div class="shell-layout">
  <aside class="sidebar">
    <h2 class="brand"><i class="bi bi-building"></i> PMS</h2>
    <p class="property">Grand Hotel · Admin</p>

    <nav class="nav-list" aria-label="Primary navigation">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        class="nav-item"
        [class.active]="isNavItemActive(item)"
      >
        <i class="nav-icon bi" [ngClass]="item.iconClass" aria-hidden="true"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <section class="content">
    <header class="topbar">
      <div>
        <h1>{{ (pageTitle$ | async) ?? 'PMS Module 1' }}</h1>
        <p class="date-label">{{ todayLabel }}</p>
      </div>

      <div class="topbar-actions">
        <div *ngIf="isRoomsRoute" class="view-switch">
          <a
            routerLink="/rooms"
            class="ghost-btn"
            [class.active]="!isRoomsCalendarView"
          >
            <i class="bi bi-list-ul"></i>
            List View
          </a>
          <a
            routerLink="/rooms/calendar-view"
            class="ghost-btn"
            [class.active]="isRoomsCalendarView"
          >
            <i class="bi bi-calendar3"></i>
            Calendar View
          </a>
        </div>

        <a *ngIf="showTopCta" [routerLink]="topCtaLink" class="primary-btn">
          <i class="bi" [ngClass]="topCtaIcon"></i>
          {{ topCtaLabel }}
        </a>
      </div>
    </header>

    <main class="page-container">
      <router-outlet />
    </main>
  </section>
</div>
